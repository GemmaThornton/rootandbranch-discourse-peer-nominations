name: Notify Forum Repo (Production)

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger production rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_DISPATCH_TOKEN }}
          repository: jpaylor/rootandbranch-forum
          event-type: plugin-updated-production
