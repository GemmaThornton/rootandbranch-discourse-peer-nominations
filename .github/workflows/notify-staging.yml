name: Notify Forum Repo (Staging)

on:
  push:
    branches: [next]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger staging rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_DISPATCH_TOKEN }}
          repository: jpaylor/rootandbranch-forum
          event-type: plugin-updated-staging
